<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Volt EV Tracker</title>
    
    <!-- PWA & iOS Customization -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Volt" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <meta name="theme-color" content="#0a0a0c" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then((reg) => console.log('Volt Service Worker registered successfully:', reg.scope))
            .catch((err) => console.error('Volt Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
